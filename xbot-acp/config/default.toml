[app]
name = "xbot-acp"
log_level = "info"
default_agent = "claude-code"  # 可选: "claude-code" 或 "codex"

[agent]
command = "claude"

[file]
blocked_paths = ["${HOME}/../etc", "/etc", "/System", "/usr", "/bin", "/sbin"]

[terminal]
blocked_patterns = ["rm -rf /", "dd if=/dev/zero"]
max_execution_time = 1800

[permission]
timeout = 30
cleanup_interval = 60