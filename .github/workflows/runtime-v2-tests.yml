name: runtime-v2-tests

on:
  pull_request:
    paths:
      - "xbot/runtime/**"
      - "xbot/interaction/**"
      - "tests/unit/runtime/**"
      - "pyproject.toml"
      - ".github/workflows/runtime-v2-tests.yml"
      - "scripts/test_runtime_v2.sh"
  push:
    branches:
      - main
      - master
    paths:
      - "xbot/runtime/**"
      - "xbot/interaction/**"
      - "tests/unit/runtime/**"
      - "pyproject.toml"
      - ".github/workflows/runtime-v2-tests.yml"
      - "scripts/test_runtime_v2.sh"

jobs:
  runtime-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run runtime-v2 tests with coverage gate
        run: |
          ./scripts/test_runtime_v2.sh
